# ============================================================
# PROD Profile — MySQL, validate DDL, no H2 console, WARN logging
#
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=prod
# ============================================================

# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/quantitydb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=yourpassword

# JPA / Hibernate (validate — schema already exists via Flyway/Liquibase)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# H2 Console DISABLED in production
spring.h2.console.enabled=false

# Logging (minimal in prod)
logging.level.root=WARN
logging.level.com.bridgelabz=INFO
logging.level.org.springframework=WARN
